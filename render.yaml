services:
  # Backend API (FastAPI)
  - type: web
    name: dockslot-backend
    env: python
    buildCommand: cd src/backend && pip install -r requirements.txt
    startCommand: cd src/backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend Web App (Static Site)
  - type: web
    name: dockslot-frontend
    env: static
    buildCommand: cd src/frontend && npm install && npm run build
    staticPublishPath: src/frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
